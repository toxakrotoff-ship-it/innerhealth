x-logging: &default-logging
  driver: local
  options:
    max-size: "10m"
    max-file: "3"

services:
  app:
    image: nextjs-project-app:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_YANDEX_MAPS_API_KEY: ${NEXT_PUBLIC_YANDEX_MAPS_API_KEY:-}
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-innerhealth}:${POSTGRES_PASSWORD:-innerhealth_secret}@db:5432/${POSTGRES_DB:-innerhealth}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://innerhaealth.inetrnet.pp.ru}
      # 0 = не запускать миграции при старте (БД уже мигрирована/перенесена). Включить: RUN_MIGRATE=1 в .env
      RUN_MIGRATE: "0"
    # Загрузки с админки: путь на диске должен совпадать с getProjectRoot() + public/uploads (= /app/public/uploads при standalone)
    volumes:
      - ./public/uploads:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy
    # No ports to host — only nginx talks to app
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1500M

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-innerhealth}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-innerhealth_secret}
      POSTGRES_DB: ${POSTGRES_DB:-innerhealth}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 5
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.8"
          memory: 1500M

  telegram-bot:
    # Экономим SSD: бот не нуждается в отдельной сборке Next.js.
    # Используем тот же image, что и `app` (в нём есть /app/scripts и deps).
    image: nextjs-project-app:latest
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-innerhealth}:${POSTGRES_PASSWORD:-innerhealth_secret}@db:5432/${POSTGRES_DB:-innerhealth}
      TELEGRAM_SITE_URL: http://app:3000
      RUN_MIGRATE: "0"
    command: ["npm", "run", "telegram-bot"]
    depends_on:
      app:
        condition: service_started
      db:
        condition: service_healthy
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 256M

  max-bot:
    # MAX боту нужен отдельный раннер (polling), иначе привязка через /api/admin/max/confirm
    # не выполняется и whitelist остаётся пустым.
    image: nextjs-project-app:latest
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-innerhealth}:${POSTGRES_PASSWORD:-innerhealth_secret}@db:5432/${POSTGRES_DB:-innerhealth}
      MAX_SITE_URL: http://app:3000
      RUN_MIGRATE: "0"
    command: ["npm", "run", "max-bot:dev"]
    depends_on:
      app:
        condition: service_started
      db:
        condition: service_healthy
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 256M

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./deploy/nginx/ssl:/etc/nginx/ssl:ro
      - certbot_www:/var/www/certbot:ro
      # Раздача /uploads/ с диска (nginx), без прокси через Node; тот же каталог, что у app volume
      - ./public/uploads:/var/www/uploads:ro
    depends_on:
      - app
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 256M

volumes:
  postgres_data:
  certbot_www:
