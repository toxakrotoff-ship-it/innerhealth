# === Что править ===
# 1. Домен: замените server_name _ на ваш домен (например innerhealth.ru) или оставьте _.
# 2. HTTPS: получите сертификаты (certbot), положите в deploy/nginx/ssl/, раскомментируйте блок server { listen 443 ... } ниже и при необходимости редирект с 80 на 443.
# 3. После правок на сервере: docker compose up -d --force-recreate nginx

# HTTP server (redirect to HTTPS when SSL is enabled)
# Замените example.com на ваш домен или оставьте _ для приёма любого хоста (IP/домен)
# Резолв при запросе (Docker DNS 127.0.0.11), чтобы nginx -t не падал, если app ещё не поднят
server {
  listen 80;
  server_name innerhaealth.inetrnet.pp.ru sprint-power.inetrnet.pp.ru;
  resolver 127.0.0.11 valid=10s ipv6=off;
  set $app_backend "http://app:3000";

  # Лимит тела запроса (загрузка файлов в админке — до 5 МБ в приложении, даём запас)
  client_max_body_size 10M;

  # Раздача загрузок (Next.js standalone не отдаёт public/; файлы пишет app в тот же volume)
  location /uploads/ {
    alias /var/www/uploads/;
    add_header Cache-Control "public, max-age=86400";
  }

  # For Let's Encrypt / certbot
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
    allow all;
  }

  # Redirect HTTP -> HTTPS
  return 301 https://$host$request_uri;

  # Static images from Next public/ (categories, partners, etc.).
  # Strip cookies so that app always serves them anonymously and
  # doesn't apply auth/middleware logic that can lead to 400.
  location /images/ {
    proxy_pass $app_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Brand $brand_id;
    proxy_set_header Cookie "";
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
  }

  location / {
    proxy_pass $app_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Brand $brand_id;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
  }
}

server {
  listen 443 ssl http2;
  server_name innerhaealth.inetrnet.pp.ru sprint-power.inetrnet.pp.ru;
  resolver 127.0.0.11 valid=10s ipv6=off;
  set $app_backend "http://app:3000";

  ssl_certificate     /etc/nginx/ssl/fullchain.pem;
  ssl_certificate_key /etc/nginx/ssl/privkey.pem;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:50m;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
  client_max_body_size 10M;

  location /uploads/ {
    alias /var/www/uploads/;
    add_header Cache-Control "public, max-age=86400";
  }

  location / {
    proxy_pass $app_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Brand $brand_id;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
  }
}
