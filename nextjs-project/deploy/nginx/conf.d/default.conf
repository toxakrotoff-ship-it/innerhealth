# Multi-brand reverse proxy:
# - inner domain and sprint-power domain point to one Next.js app
# - brand is resolved in app by Host / X-Forwarded-Host, optionally forced via X-Brand
# - this config always redirects HTTP to HTTPS

# Explicit storefront → Next.js brand id (matches `BrandId` in the app).
# Empty value: app falls back to host hints in `resolveBrandByHost`.
map $host $ih_proxy_brand {
  default                        "";
  sprint-power.inetrnet.pp.ru    sprint-power;
  sprintpower.inetrnet.pp.ru     sprint-power;
  www.sprintpower.inetrnet.pp.ru sprint-power;
}

server {
  listen 80;
  server_name www.innerhealth.ru;
  return 301 https://innerhealth.ru$request_uri;
}

server {
  listen 443 ssl http2;
  server_name www.innerhealth.ru;

  ssl_certificate     /etc/nginx/ssl/fullchain.pem;
  ssl_certificate_key /etc/nginx/ssl/privkey.pem;

  return 301 https://innerhealth.ru$request_uri;
}

server {
  listen 80;
  server_name innerhealth.ru sprint-power.inetrnet.pp.ru sprintpower.inetrnet.pp.ru www.sprintpower.inetrnet.pp.ru;

  # Allow ACME challenge over plain HTTP.
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
    allow all;
  }

  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name innerhealth.ru sprint-power.inetrnet.pp.ru sprintpower.inetrnet.pp.ru www.sprintpower.inetrnet.pp.ru;
  resolver 127.0.0.11 valid=10s ipv6=off;
  set $app_backend "http://app:3000";

  ssl_certificate     /etc/nginx/ssl/fullchain.pem;
  ssl_certificate_key /etc/nginx/ssl/privkey.pem;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:50m;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
  client_max_body_size 10M;

  location /uploads/ {
    alias /var/www/uploads/;
    add_header Cache-Control "public, max-age=86400";
  }

  location / {
    proxy_pass $app_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Brand $ih_proxy_brand;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
  }
}
